<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 800px;
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.5em;
            font-weight: bold;
        }

        .score {
            flex: 1;
        }

        #gameCanvas {
            display: block;
            background-color: #000;
            border: 4px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            margin: 0 auto;
        }

        .instructions {
            color: #fff;
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .instructions p {
            margin: 5px 0;
        }

        .reset-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1em;
            background-color: #00ff00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .reset-button:hover {
            background-color: #00cc00;
            transform: scale(1.05);
        }

        .reset-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 PONG GAME 🎮</h1>
        <div class="scoreboard">
            <div class="score">Player: <span id="playerScore">0</span></div>
            <div class="score">Computer: <span id="computerScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="instructions">
            <p>🎯 <strong>Controls:</strong> Use Mouse Y-position or Arrow Keys (↑/↓) to move your paddle</p>
            <p>⚽ Hit the ball past your opponent to score!</p>
        </div>
        <button class="reset-button" onclick="resetGame()">Reset Game</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 6;

        let playerPaddle = {
            x: 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6
        };

        let computerPaddle = {
            x: canvas.width - 30,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 4
        };

        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            radius: ballSize,
            speed: 5,
            maxSpeed: 8
        };

        let scores = {
            player: 0,
            computer: 0
        };

        // Input handling
        const keys = {};
        let mouseY = canvas.height / 2;

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        // Update functions
        function updatePlayerPaddle() {
            // Arrow keys control
            if (keys['ArrowUp']) {
                playerPaddle.y -= playerPaddle.speed;
            }
            if (keys['ArrowDown']) {
                playerPaddle.y += playerPaddle.speed;
            }

            // Mouse control (optional override)
            if (mouseY > 0 && mouseY < canvas.height) {
                playerPaddle.y = mouseY - playerPaddle.height / 2;
            }

            // Boundary collision
            if (playerPaddle.y < 0) {
                playerPaddle.y = 0;
            }
            if (playerPaddle.y + playerPaddle.height > canvas.height) {
                playerPaddle.y = canvas.height - playerPaddle.height;
            }
        }

        function updateComputerPaddle() {
            const computerCenter = computerPaddle.y + computerPaddle.height / 2;
            const ballCenter = ball.y;

            // Simple AI - track the ball with slight imperfection
            if (computerCenter < ballCenter - 35) {
                computerPaddle.y += computerPaddle.speed;
            } else if (computerCenter > ballCenter + 35) {
                computerPaddle.y -= computerPaddle.speed;
            }

            // Boundary collision
            if (computerPaddle.y < 0) {
                computerPaddle.y = 0;
            }
            if (computerPaddle.y + computerPaddle.height > canvas.height) {
                computerPaddle.y = canvas.height - computerPaddle.height;
            }
        }

        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision (top and bottom)
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.radius, Math.min(canvas.height - ball.radius, ball.y));
            }

            // Paddle collision - Player
            if (
                ball.x - ball.radius < playerPaddle.x + playerPaddle.width &&
                ball.y > playerPaddle.y &&
                ball.y < playerPaddle.y + playerPaddle.height
            ) {
                ball.dx = -ball.dx;
                ball.x = playerPaddle.x + playerPaddle.width + ball.radius;

                // Add spin based on where ball hits paddle
                let collidePoint = ball.y - (playerPaddle.y + playerPaddle.height / 2);
                collidePoint = collidePoint / (playerPaddle.height / 2);
                ball.dy = collidePoint * ball.maxSpeed;

                // Increase speed slightly
                ball.dx *= 1.05;
            }

            // Paddle collision - Computer
            if (
                ball.x + ball.radius > computerPaddle.x &&
                ball.y > computerPaddle.y &&
                ball.y < computerPaddle.y + computerPaddle.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computerPaddle.x - ball.radius;

                // Add spin based on where ball hits paddle
                let collidePoint = ball.y - (computerPaddle.y + computerPaddle.height / 2);
                collidePoint = collidePoint / (computerPaddle.height / 2);
                ball.dy = collidePoint * ball.maxSpeed;

                // Increase speed slightly
                ball.dx *= 1.05;
            }

            // Scoring
            if (ball.x - ball.radius < 0) {
                scores.computer++;
                resetBall();
            }
            if (ball.x + ball.radius > canvas.width) {
                scores.player++;
                resetBall();
            }

            // Update scoreboard
            document.getElementById('playerScore').textContent = scores.player;
            document.getElementById('computerScore').textContent = scores.computer;
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() * 2 - 1) * 3;
        }

        // Draw functions
        function drawPaddle(paddle) {
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.strokeStyle = '#00cc00';
            ctx.lineWidth = 2;
            ctx.strokeRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        function drawBall() {
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            // Add glow effect
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius + 3, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawCenterLine() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.setLineDash([10, 10]);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw game elements
            drawCenterLine();
            drawPaddle(playerPaddle);
            drawPaddle(computerPaddle);
            drawBall();
        }

        // Game loop
        function gameLoop() {
            updatePlayerPaddle();
            updateComputerPaddle();
            updateBall();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            scores.player = 0;
            scores.computer = 0;
            playerPaddle.y = canvas.height / 2 - paddleHeight / 2;
            computerPaddle.y = canvas.height / 2 - paddleHeight / 2;
            resetBall();
            document.getElementById('playerScore').textContent = scores.player;
            document.getElementById('computerScore').textContent = scores.computer;
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
